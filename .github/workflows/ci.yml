name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: typecheck + unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npm run check

      - name: unit tests
        run: npm test

  check-required:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - run: echo "typecheck + unit tests matrix passed"
