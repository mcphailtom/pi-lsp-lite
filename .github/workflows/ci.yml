name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npm run check

      - name: unit tests
        run: npm test
